# After Let's Encrypt certs exist for pimux.store, merge this into nginx-pimux.store.conf
# (or run deploy/enable_pimux_https.sh) so HTTPS proxies to Django like HTTP.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pimux.store www.pimux.store;

    ssl_certificate     /etc/letsencrypt/live/pimux.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pimux.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location /static/ {
        alias /srv/restaurant-app/staticfiles/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_pass http://restaurant_django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
    }
}
