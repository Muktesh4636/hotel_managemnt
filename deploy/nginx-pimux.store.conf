# Install on the server as e.g. /etc/nginx/sites-available/pimux.store
# HTTPS block is added after certs exist (see deploy/enable_pimux_https.sh).

upstream restaurant_django {
    server 127.0.0.1:8020 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    # Include the VM’s public IP so http://<IP>/app/ reaches Django (many hosts share the same IP).
    server_name pimux.store www.pimux.store 72.61.148.117;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location /static/ {
        alias /srv/restaurant-app/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /srv/restaurant-app/backend/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://restaurant_django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
    }
}
