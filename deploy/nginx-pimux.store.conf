# Install on the server as e.g. /etc/nginx/sites-available/pimux.store
# then: ln -sf /etc/nginx/sites-available/pimux.store /etc/nginx/sites-enabled/
# Adjust ssl_certificate paths to match your certbot (or provider) layout.

upstream restaurant_django {
    server 127.0.0.1:8002 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name pimux.store www.pimux.store;
    # After TLS works, redirect HTTP → HTTPS:
    # return 301 https://$host$request_uri;

    location /static/ {
        alias /srv/restaurant-app/staticfiles/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_pass http://restaurant_django;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
    }
}

